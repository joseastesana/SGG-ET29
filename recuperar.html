<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="classic-theme">
    
    <div class="theme-switcher">
        <button id="themeToggle" aria-label="Cambiar tema visual">
            <span id="themeIcon">🌙</span>
        </button>
    </div>

    <main class="container">
        <div>
            <section class="card-login">
                <header>
                    <h1>Cambiar Contraseña</h1>
                    <p>Ingresa tu correo registrado y tu nueva clave.</p>
                </header>
            
                <form id="recoverForm" novalidate>
                    <div class="form-group">
                        <label for="recoverEmail">Correo Electrónico</label>
                        <input type="email" id="recoverEmail" required>
                    </div>

                    <div class="form-group">
                        <label for="newPassword">Nueva Contraseña</label>
                        <div class="password-wrapper">
                            <input type="password" id="newPassword" required>
                            <button type="button" id="toggleNewPassword" class="btn-eye" aria-label="Mostrar u ocultar contraseña">👁️</button>
                        </div>
                    </div>

                    <p id="recoverMessage" class="error-text"></p>
                    <button type="submit" class="btn-primary">Actualizar Contraseña</button>
                </form>
                <div class="form-links">
                    <a href="index.html" class="forgot-password">Volver al Login</a>
                </div>
             </section>          
        </div>
           
    </main>

    <script src="js/password-toggle.js"></script>
    <script src="js/recuperar.js"></script>
    <script src="js/theme.js"></script>
</body>
</html>
