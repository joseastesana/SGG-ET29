<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestión de Gastos Familiares</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="classic-theme"> <div class="theme-switcher">
        <button id="themeToggle" aria-label="Cambiar tema visual">
            <span id="themeIcon">🌙</span>
        </button>
    </div>

    <main class="container">
        <section class="card-login">
            <header>
                <h1>¡Hola de nuevo!</h1>
                <p>Ingresa para anotar tus gastos</p>
            </header>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="********" required>
                        <button type="button" id="togglePassword" class="btn-eye" aria-label="Mostrar contraseña">👁️</button>
                    </div>
                </div>

                <div id="errorMessage" class="error-msg" role="alert" aria-live="assertive"></div>

                <button type="submit" class="btn-primary">Entrar al Sistema</button>
            </form>

            <footer>
                <p>¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
            </footer>
        </section>
    </main>

    <script src="js/login.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/password-toggle.js"></script>
</body>
</html>
